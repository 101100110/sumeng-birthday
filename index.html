<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>粟梦 · 生日快乐</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffdde1 0%, #f9c9e2 40%, #f9b5d0 100%);
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            opacity: 0.7;
            animation: floatAround 18s infinite ease-in-out;
            font-size: 2rem;
        }
        @keyframes floatAround {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(5deg); opacity: 0.8; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
        }
        .birthday-card {
            position: relative;
            z-index: 10;
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 72px 72px 88px 88px;
            box-shadow: 0 30px 45px rgba(236, 110, 173, 0.25);
            text-align: center;
            padding: 2rem;
        }
        .cake-icon {
            font-size: 5rem;
            filter: drop-shadow(2px 8px 12px rgba(0,0,0,0.2));
            animation: bounceSoft 2s infinite;
            display: inline-block;
        }
        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.4rem;
            background: linear-gradient(135deg, #D23B6E, #F78CA2, #FFD166);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .greeting {
            font-size: 1.4rem;
            color: #A13E63;
            margin-top: 0.5rem;
        }
        .message-box {
            background: #FFF9FB;
            border-radius: 60px;
            padding: 1.6rem;
            margin: 2rem 0;
        }
        .message-box p {
            font-size: 1.2rem;
            line-height: 1.55;
            color: #4f2d3a;
        }
        .wish-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .wish-card {
            background: rgba(255, 231, 240, 0.8);
            border-radius: 50px;
            padding: 0.6rem 1.4rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #b1456b;
        }
        .music-trigger {
            background: #d94f7c;
            border: none;
            color: white;
            padding: 12px 26px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            margin: 10px 0 20px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .music-trigger:active {
            transform: scale(0.96);
        }
        .footer-note {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #b8728b;
            border-top: 1px dashed #ffbfcf;
            padding-top: 20px;
        }
        @media (max-width: 550px) {
            h1 { font-size: 2.5rem; }
            .message-box p { font-size: 1rem; }
        }
        .twinkle-star {
            position: absolute;
            background: gold;
            border-radius: 50%;
            width: 4px;
            height: 4px;
            animation: twinkle 1.5s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="floating-bg" id="floatingBg"></div>
<main class="birthday-card">
    <div class="cake-icon">🎂✨</div>
    <h1>粟梦</h1>
    <div class="greeting">
        <i class="fas fa-crown"></i> Happy Birthday! <i class="fas fa-crown"></i>
    </div>
    <div class="message-box">
        <p>
            🌸 致最特别的 <strong>粟梦</strong> 🌸<br>
            愿你每一岁都奔走在自己的热爱里，<br>
            如星辰般璀璨，如春风般自由。<br>
            所有美好与惊喜，如约而至 💖
        </p>
    </div>
    <div class="wish-list">
        <div class="wish-card"><i class="fas fa-star"></i> 梦想成真</div>
        <div class="wish-card"><i class="fas fa-heart"></i> 桃花满满</div>
        <div class="wish-card"><i class="fas fa-champagne-glasses"></i> 前程似锦</div>
        <div class="wish-card"><i class="fas fa-cake-candles"></i> 天天甜度满分</div>
    </div>
    <button class="music-trigger" id="playMusicBtn">
        <i class="fas fa-music"></i> 播放生日祝福音乐 🎵
    </button>
    <div class="footer-note">
        <span>✨ 来自所有爱你的人 · 特别企划 ✨</span>
    </div>
</main>

<script>
    // 漂浮元素
    const bgContainer = document.getElementById('floatingBg');
    const icons = ['🎈', '🎀', '✨', '⭐', '🌸', '🍰', '🎁', '💝', '🎉', '🥳'];
    for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        el.classList.add('bubble');
        el.style.fontSize = (Math.random() * 28 + 16) + 'px';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = Math.random() * 100 + '%';
        el.style.animationDuration = (Math.random() * 15 + 8) + 's';
        bgContainer.appendChild(el);
    }
    for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.classList.add('twinkle-star');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 6 + 2 + 'px';
        star.style.height = star.style.width;
        bgContainer.appendChild(star);
    }

    // ========== 修复版音乐播放 ==========
    // 使用 Web Audio API 生成生日快乐旋律（不需要外部文件）
    let audioCtx = null;
    let isPlaying = false;

    function playBirthdayMelody() {
        try {
            // 创建音频上下文（需要在用户点击后创建）
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // 恢复音频上下文（如果处于暂停状态）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // 生日快乐简谱对应的频率（C大调）
            // 音符: 5 5 6 5 1 7 | 5 5 6 5 2 1 | 5 5 5 3 1 7 6 | 4 4 3 1 2 1
            const melody = [
                // 第一句
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 440.00, duration: 0.45 }, // 6
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 523.25, duration: 0.45 }, // 1·
                { freq: 493.88, duration: 0.9 },  // 7
                // 第二句
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 440.00, duration: 0.45 }, // 6
                { freq: 392.00, duration: 0.45 }, // 5
                { freq: 587.33, duration: 0.45 }, // 2·
                { freq: 523.25, duration: 0.9 },  // 1·
                // 第三句
                { freq: 392.00, duration: 0.4 },  // 5
                { freq: 392.00, duration: 0.4 },  // 5
                { freq: 392.00, duration: 0.4 },  // 5
                { freq: 349.23, duration: 0.4 },  // 3
                { freq: 523.25, duration: 0.4 },  // 1·
                { freq: 493.88, duration: 0.4 },  // 7
                { freq: 440.00, duration: 0.8 },  // 6
                // 第四句
                { freq: 349.23, duration: 0.45 }, // 3
                { freq: 349.23, duration: 0.45 }, // 3
                { freq: 329.63, duration: 0.45 }, // 2
                { freq: 261.63, duration: 0.45 }, // 1
                { freq: 523.25, duration: 0.45 }, // 1·
                { freq: 493.88, duration: 1.2 }   // 7
            ];
            
            let startTime = audioCtx.currentTime;
            
            melody.forEach(note => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = note.freq;
                oscillator.type = 'sine'; // 正弦波，更柔和
                
                // 音量包络（淡入淡出）
                gainNode.gain.setValueAtTime(0.2, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + note.duration);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + note.duration);
                
                startTime += note.duration;
            });
            
            return true;
        } catch (error) {
            console.error('音频播放失败:', error);
            return false;
        }
    }

    // 获取按钮
    const musicBtn = document.getElementById('playMusicBtn');
    
    // 按钮点击事件
    musicBtn.addEventListener('click', function() {
        const success = playBirthdayMelody();
        
        if (success) {
            // 改变按钮文字反馈
            const originalHTML = musicBtn.innerHTML;
            musicBtn.innerHTML = '<i class="fas fa-heart"></i> 🎵 生日快乐送给你 🎵 <i class="fas fa-heart"></i>';
            setTimeout(() => {
                musicBtn.innerHTML = originalHTML;
            }, 2500);
            
            // 添加震动效果（可选，部分浏览器支持）
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        } else {
            musicBtn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 点这里播放 🎵';
            setTimeout(() => {
                musicBtn.innerHTML = '<i class="fas fa-music"></i> 播放生日祝福音乐 🎵';
            }, 1500);
        }
    });
    
    // 页面加载完成后提示用户点击（手机浏览器需要用户交互）
    console.log('🎂 粟梦生日快乐！点击按钮播放音乐 🎂');
    
    // 爱心彩蛋：点击卡片出现漂浮爱心
    document.querySelector('.birthday-card').addEventListener('click', function(e) {
        // 避免与按钮点击重复触发
        if (e.target.closest('.music-trigger')) return;
        
        const heart = document.createElement('div');
        heart.innerHTML = '💖';
        heart.style.position = 'fixed';
        heart.style.left = (e.clientX - 10) + 'px';
        heart.style.top = (e.clientY - 10) + 'px';
        heart.style.fontSize = '1.5rem';
        heart.style.pointerEvents = 'none';
        heart.style.zIndex = '9999';
        heart.style.opacity = '1';
        heart.style.transition = 'all 0.6s ease-out';
        document.body.appendChild(heart);
        
        setTimeout(() => {
            heart.style.opacity = '0';
            heart.style.transform = 'translateY(-60px) translateX(20px) rotate(15deg)';
        }, 10);
        setTimeout(() => heart.remove(), 700);
    });
</script>
</body>
</html>
